services:
  # ---------- MySQL 数据库 ----------
  mysql:
    image: mysql:8.0
    container_name: todo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: todo_db
      MYSQL_USER: todo_user
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - ./storage/mysql_data:/var/lib/mysql
    mem_limit: 512m
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis 缓存 ----------
  redis:
    image: redis:7.0-alpine
    container_name: todo-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./storage/redis_data:/data
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Go 应用 ----------
  app:
    build: .
    container_name: todo-app
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SERVER_PORT=:8080
      - DATABASE_DSN=root:123456@tcp(mysql:3306)/todo_db?charset=utf8mb4&parseTime=True&loc=Local&timeout=30s&readTimeout=30s&writeTimeout=30s
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=
      - LOG_LEVEL=info
      - LOG_OUTPUT_PATH=stdout
    volumes:
      - ./storage/logs:/app/logs
      - ./config/config.yaml:/app/config/config.yaml
    mem_limit: 256m