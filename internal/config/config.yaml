# ============================================
#   TodoList 项目配置文件（开发环境）
# ============================================

# ---------- 服务器配置 ----------
server:
  port: 8080                # Gin 监听端口
  mode: debug               # 运行模式: debug / release / test

# ---------- 数据库配置 ----------
database:
  # MySQL DSN 连接串（包含用户名、密码、地址、数据库名、字符集、时区等）
  dsn: "root:123456@tcp(127.0.0.1:3306)/todo_db?charset=utf8mb4&parseTime=True&loc=Local"
  # 注意：如果使用 Docker Compose 启动，请将 127.0.0.1 改为 mysql（服务名）
  # 例如： "root:123456@tcp(mysql:3306)/todo_db?charset=utf8mb4&parseTime=True&loc=Local"

# ---------- Redis 缓存配置 ----------
redis:
  addr: "127.0.0.1:6379"    # Redis 地址
  password: ""              # Redis 密码（若无则留空）
  db: 0                     # 使用的数据库编号（0-15）
  # 如果使用 Docker Compose，请将 addr 改为 "redis:6379"

# ---------- 日志配置（可选） ----------
log:
  level: "info"             # 日志级别: debug / info / warn / error
  output_path: "storage/logs/app.log"  # 日志输出路径（留空则输出到控制台）
  format: "text"            # 输出格式: text / json

# ---------- JWT 鉴权（后期扩展） ----------
jwt:
  secret: "your-secret-key-change-in-production"  # 签名密钥（生产环境务必更换）
  expire_hours: 24         # Token 过期时间（小时）